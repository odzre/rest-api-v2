<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — API Dashboard</title>
    <link rel="stylesheet" href="/admin/css/dashboard.css?v=2">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                </div>
                <h1>API Dashboard</h1>
                <p>Masuk untuk mengelola sistem API</p>
            </div>
            <div class="login-error" id="loginError"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" type="text" id="username" placeholder="Masukkan username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" placeholder="Masukkan password" required>
                </div>
                <button class="btn btn-primary login-btn" type="submit" id="loginBtn">Masuk</button>
            </form>
        </div>
    </div>
    <script src="/admin/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initLoginPage);
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12') e.preventDefault();
            if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) e.preventDefault();
            if (e.ctrlKey && e.key.toUpperCase() === 'U') e.preventDefault();
        });
        (function d(){try{(function(){}).constructor('debugger')();setTimeout(d,100)}catch(e){}})();
    </script>
</body>
</html>
