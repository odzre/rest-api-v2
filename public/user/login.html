<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Odzreshop API</title>
    <link rel="stylesheet" href="/user/css/dashboard.css?v=3">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                </div>
                <h1 id="siteBrand">Odzreshop API</h1>
                <p>Masuk ke dashboard Anda</p>
            </div>
            <div class="login-error" id="loginError"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" type="email" id="email" placeholder="Masukkan email" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" placeholder="Masukkan password" required>
                </div>
                <button class="btn btn-primary login-btn" type="submit" id="loginBtn">Masuk</button>
            </form>
            <div class="login-link">Belum punya akun? <a href="/user/register">Daftar sekarang</a></div>
        </div>
    </div>

    <!-- CS Chat Widget -->
    <div class="cs-widget" id="csWidget" style="display:none">
        <div class="cs-box" id="csBox">
            <div class="cs-box-header">
                <div class="cs-box-header-avatar"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.549 4.126 1.518 5.865L.057 23.764l6.087-1.42A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.82c-1.918 0-3.79-.516-5.417-1.49l-.389-.231-3.61.842.885-3.494-.253-.403A9.78 9.78 0 0 1 2.18 12c0-5.424 4.396-9.82 9.82-9.82 5.424 0 9.82 4.396 9.82 9.82 0 5.424-4.396 9.82-9.82 9.82z"/></svg></div>
                <div class="cs-box-header-info"><h4>Customer Service</h4><p>Biasanya membalas dalam hitungan menit</p></div>
            </div>
            <div class="cs-box-body">
                <p>👋 Halo! Ada yang bisa kami bantu? Ketik pesan Anda di bawah ini.</p>
                <div class="cs-box-input">
                    <input type="text" id="csMessage" placeholder="Tulis pesan..." onkeydown="if(event.key==='Enter')sendCsMessage()">
                    <button onclick="sendCsMessage()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
                </div>
            </div>
        </div>
        <button class="cs-btn" onclick="toggleCsBox()" title="Chat Customer Service">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.549 4.126 1.518 5.865L.057 23.764l6.087-1.42A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.82c-1.918 0-3.79-.516-5.417-1.49l-.389-.231-3.61.842.885-3.494-.253-.403A9.78 9.78 0 0 1 2.18 12c0-5.424 4.396-9.82 9.82-9.82 5.424 0 9.82 4.396 9.82 9.82 0 5.424-4.396 9.82-9.82 9.82z"/></svg>
        </button>
    </div>

    <script src="/user/js/auth.js"></script>
    <script>
        let _csWaNumber = '';
        function toggleCsBox() { document.getElementById('csBox').classList.toggle('open'); }
        function sendCsMessage() {
            const msg = document.getElementById('csMessage').value.trim();
            if (!msg || !_csWaNumber) return;
            window.open('https://wa.me/' + _csWaNumber + '?text=' + encodeURIComponent(msg), '_blank');
            document.getElementById('csMessage').value = '';
            document.getElementById('csBox').classList.remove('open');
        }
        fetch('/api/site-config').then(r=>r.json()).then(c=>{
            if(c.title) document.title='Login — '+c.title;
            if(c.favicon){const l=document.createElement('link');l.rel='icon';l.href=c.favicon;document.head.appendChild(l);}
            if(c.siteName) document.getElementById('siteBrand').textContent=c.siteName;
            if(c.whatsapp) { _csWaNumber = c.whatsapp; document.getElementById('csWidget').style.display = 'block'; }
        }).catch(()=>{});
        document.addEventListener('DOMContentLoaded', () => {
            if (UserAuth.isLoggedIn()) { window.location.href = '/user/dashboard'; return; }
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const errEl = document.getElementById('loginError');
                const btn = document.getElementById('loginBtn');
                errEl.style.display = 'none';
                btn.disabled = true; btn.textContent = 'Memproses...';
                const result = await UserAuth.login(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                if (result.success) { window.location.href = '/user/dashboard'; }
                else { errEl.textContent = result.message; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Masuk'; }
            });
        });
    </script>
</body>
</html>
