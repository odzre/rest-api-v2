<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice & Payment QRIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --brand: #f37021;
            --bg-base: #000000;
            --bg-card: #121111;
            --border: #2a2a2a;
            --border-soft: #1f1e1e;
        }
        * { -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-base); color: #fff; letter-spacing: -0.01em; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .bg-pattern {
            background-color: #121111;
            background-image: linear-gradient(135deg, #1b1a1a 25%, transparent 25%, transparent 50%, #1b1a1a 50%, #1b1a1a 75%, transparent 75%, transparent);
            background-size: 5px 5px;
        }
        .container-slim {
            max-width: 420px; margin: 0 auto;
            background-color: var(--bg-card);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            position: relative; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .dash-divider {
            background-image: linear-gradient(to right, var(--border) 50%, transparent 50%);
            background-size: 8px 1px; background-repeat: repeat-x;
            background-position: center; height: 1px;
        }

        .acc-content { max-height: 0; overflow: hidden; transition: max-height 0.35s ease, padding 0.35s ease; }
        .acc-active .acc-content { max-height: 400px; padding-bottom: 18px; }
        .acc-active .rotate { transform: rotate(180deg); color: var(--brand); }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-green { background: rgba(34,197,94,0.15); color: #22c55e; }
        .badge-red { background: rgba(239,68,68,0.15); color: #ef4444; }
        .badge-orange { background: rgba(243,112,33,0.15); color: #f37021; }

        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-dot { animation: pulse-soft 1.4s infinite; }
        .status-glow { box-shadow: 0 0 0 4px rgba(243, 112, 33, 0.08), 0 0 18px rgba(243, 112, 33, 0.25); }

        .pm-chip {
            background: #0d0c0c; border: 1px solid var(--border-soft);
            border-radius: 8px; padding: 10px 6px;
            display: flex; align-items: center; justify-content: center;
            min-height: 36px; transition: all 0.2s ease;
        }
        .pm-chip:hover { border-color: var(--brand); background: #161414; }
        .pm-chip .bank-text { font-weight: 800; font-size: 11px; letter-spacing: 0.5px; }

        .cta-btn { background: var(--brand); position: relative; overflow: hidden; border: none; cursor: pointer; }
        .cta-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
            transform: translateX(-100%); transition: transform 0.6s ease;
        }
        .cta-btn:hover::before { transform: translateX(100%); }
        .cta-btn:active { transform: scale(0.985); }

        @keyframes qr-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(243,112,33,0.15), 0 0 18px rgba(243,112,33,0.08); }
            50% { box-shadow: 0 0 0 6px rgba(243,112,33,0.0), 0 0 28px rgba(243,112,33,0.25); }
        }
        .qr-glow { animation: qr-glow 2.6s ease-in-out infinite; }

        .copy-flash { animation: flash 0.6s ease; }
        @keyframes flash { 0%, 100% { color: #fff; } 50% { color: var(--brand); } }

        /* Loading skeleton */
        .skeleton { background: linear-gradient(90deg, #1a1a24 25%, #222230 50%, #1a1a24 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Expired state */
        .expired-overlay { text-align: center; padding: 60px 24px; }
        .expired-icon { width: 80px; height: 80px; border-radius: 50%; background: rgba(239,68,68,0.1); border: 2px solid rgba(239,68,68,0.3); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }

        /* Grid helpers */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }

        /* ===== PAYMENT RECEIVED OVERLAY ===== */
        .pr-overlay {
            position: fixed; inset: 0; z-index: 100;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
        }
        .pr-overlay.show { opacity: 1; pointer-events: auto; }

        .pr-card {
            width: 100%; max-width: 380px;
            background: linear-gradient(180deg, #141312 0%, #0a0a0a 100%);
            border: 1px solid #2a2a2a;
            border-radius: 20px; overflow: hidden;
            transform: scale(0.85) translateY(20px); opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s;
            position: relative;
        }
        .pr-overlay.show .pr-card { transform: scale(1) translateY(0); opacity: 1; }
        .pr-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, #22c55e, transparent);
            animation: shine 2s ease-in-out infinite;
        }
        @keyframes shine { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .check-wrap {
            width: 92px; height: 92px; margin: 0 auto;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(34,197,94,0.2) 0%, transparent 70%);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .check-wrap::before, .check-wrap::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            border: 2px solid #22c55e; opacity: 0;
        }
        .pr-overlay.show .check-wrap::before { animation: ring 1.6s ease-out 0.4s infinite; }
        .pr-overlay.show .check-wrap::after { animation: ring 1.6s ease-out 0.9s infinite; }
        @keyframes ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }

        .check-circle {
            width: 64px; height: 64px; border-radius: 50%;
            background: #22c55e;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(34,197,94,0.5);
            transform: scale(0);
        }
        .pr-overlay.show .check-circle { animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards; }
        @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }

        .check-svg path { stroke-dasharray: 50; stroke-dashoffset: 50; }
        .pr-overlay.show .check-svg path { animation: draw 0.5s ease forwards 0.7s; }
        @keyframes draw { to { stroke-dashoffset: 0; } }

        .fade-up { opacity: 0; transform: translateY(12px); transition: all 0.4s ease; }
        .pr-overlay.show .fade-up { opacity: 1; transform: translateY(0); }
        .pr-overlay.show .d1 { transition-delay: 0.9s; }
        .pr-overlay.show .d2 { transition-delay: 1.0s; }
        .pr-overlay.show .d3 { transition-delay: 1.1s; }
        .pr-overlay.show .d4 { transition-delay: 1.2s; }
        .pr-overlay.show .d5 { transition-delay: 1.3s; }

        .confetti {
            position: absolute; width: 8px; height: 14px;
            top: -20px; opacity: 0; animation-fill-mode: forwards;
        }
        .pr-overlay.show .confetti { animation: fall 2.5s linear forwards; }
        @keyframes fall { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

        /* Sticky CTA */
        .sticky-cta { position: fixed; bottom: 0; left: 0; right: 0; z-index: 30; }
        .sticky-cta .container-slim { min-height: auto; border: none; }
    </style>
</head>
<body>

<div id="mainContainer" class="container-slim bg-pattern">
    <!-- Loading state -->
    <div id="loadingState" style="padding:24px">
        <div class="skeleton" style="height:60px;margin-bottom:16px"></div>
        <div class="skeleton" style="height:300px;margin-bottom:16px"></div>
        <div class="skeleton" style="height:200px"></div>
    </div>

    <!-- Error state -->
    <div id="errorState" style="display:none"></div>

    <!-- Main content -->
    <div id="invoiceContent" style="display:none"></div>
</div>

<!-- TOAST -->
<div id="toast" style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:50;background:#0d0c0c;border:1px solid var(--brand);color:#fff;font-size:12px;padding:8px 16px;border-radius:20px;opacity:0;transition:all 0.3s;pointer-events:none">
    <i class="fa-solid fa-check" style="color:var(--brand);margin-right:4px"></i>
    <span id="toastText">Tersalin!</span>
</div>

<!-- PAYMENT RECEIVED OVERLAY -->
<div id="paymentReceived" class="pr-overlay">
    <div class="confetti" style="left:10%;background:#f37021;animation-delay:0s"></div>
    <div class="confetti" style="left:20%;background:#22c55e;animation-delay:0.2s"></div>
    <div class="confetti" style="left:30%;background:#facc15;animation-delay:0.1s"></div>
    <div class="confetti" style="left:40%;background:#f37021;animation-delay:0.3s"></div>
    <div class="confetti" style="left:50%;background:#22c55e;animation-delay:0.05s"></div>
    <div class="confetti" style="left:60%;background:#facc15;animation-delay:0.25s"></div>
    <div class="confetti" style="left:70%;background:#f37021;animation-delay:0.15s"></div>
    <div class="confetti" style="left:80%;background:#22c55e;animation-delay:0.35s"></div>
    <div class="confetti" style="left:90%;background:#facc15;animation-delay:0.4s"></div>
    <div class="pr-card">
        <div style="padding:32px 24px 24px;text-align:center">
            <div class="check-wrap" style="margin-bottom:20px">
                <div class="check-circle">
                    <svg class="check-svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"></path></svg>
                </div>
            </div>
            <p class="fade-up d1" style="font-size:10px;text-transform:uppercase;letter-spacing:0.3em;color:#22c55e;font-weight:700;margin-bottom:8px">Payment Received</p>
            <h2 class="fade-up d2" style="font-size:24px;font-weight:900;margin-bottom:4px">Pembayaran Berhasil!</h2>
            <p class="fade-up d3" style="font-size:12px;color:#71717a;margin-bottom:24px">Terima kasih, langganan kamu telah diaktifkan.</p>
            <div class="fade-up d3" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:12px;padding:16px;margin-bottom:16px">
                <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:#71717a;margin-bottom:4px">Jumlah Dibayar</p>
                <p id="paidAmount" class="mono" style="font-weight:900;font-size:28px;color:#22c55e">-</p>
            </div>
            <div class="fade-up d4" id="paidDetails" style="text-align:left;margin-bottom:24px"></div>
            <div class="fade-up d5" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                <button onclick="closeReceived()" style="padding:12px;border-radius:12px;background:#1a1a1a;border:1px solid #2a2a2a;color:#d4d4d8;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer">Tutup</button>
                <button onclick="window.location.href='/user/dashboard#langganan'" style="padding:12px;border-radius:12px;background:#22c55e;border:none;color:#fff;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px"><i class="fa-solid fa-arrow-right"></i> Dashboard</button>
            </div>
            <p class="fade-up d5" style="font-size:9px;color:#3f3f46;margin-top:20px;text-transform:uppercase;letter-spacing:0.2em" id="poweredBy"></p>
        </div>
    </div>
</div>

<script>
const REFFID = window.location.pathname.split('/').pop();
let timerInterval, pollInterval, orderData;

async function init() {
    try {
        const res = await fetch(`/api/checkout/status/${REFFID}`);
        const json = await res.json();
        if (!json.success) { showError(json.message); return; }
        orderData = json.data;

        if (orderData.status === 'PAID') { showPaid(); return; }
        if (orderData.status === 'EXPIRED') { showExpired(); return; }

        renderInvoice();
        startCountdown();
        startStatusPoll();
    } catch (e) {
        showError('Gagal memuat data transaksi.');
    }
}

function fmt(n) { return 'Rp ' + (n||0).toLocaleString('id-ID'); }
function fmtDate(d) { if(!d) return '-'; const dt=new Date(d); return dt.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})+' · '+dt.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }

function renderInvoice() {
    document.getElementById('loadingState').style.display='none';
    const el = document.getElementById('invoiceContent');
    el.style.display='block';
    const d = orderData;

    el.innerHTML = `
    <!-- HEADER -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid #27272a;background:#121111;position:sticky;top:0;z-index:20">
        <div style="display:flex;align-items:center;gap:8px">
            <a href="/user/dashboard#langganan" style="color:#71717a;text-decoration:none"><i class="fa-solid fa-chevron-left" style="font-size:13px"></i></a>
            <span style="font-weight:700;color:var(--brand);font-size:15px;text-transform:uppercase;letter-spacing:0.02em">Payment Center</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:10px;text-transform:uppercase;letter-spacing:0.15em;color:#71717a">
            <span style="width:6px;height:6px;border-radius:50%;background:var(--brand)" class="pulse-dot"></span>
            <span>Secure</span>
        </div>
    </div>

    <!-- INVOICE CARD -->
    <div style="padding:16px">
        <div style="background:#0d0c0c;border:1px solid #27272a;border-radius:16px;overflow:hidden">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px">
                <div>
                    <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:#71717a;margin-bottom:4px">Status</p>
                    <div style="display:flex;align-items:center;gap:8px">
                        <span style="width:8px;height:8px;border-radius:50%;background:var(--brand)" class="pulse-dot status-glow"></span>
                        <span style="font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:0.1em">Menunggu Pembayaran</span>
                    </div>
                </div>
                <div style="text-align:right">
                    <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:#71717a;margin-bottom:4px">Bayar Dalam</p>
                    <p id="timer" class="mono" style="font-weight:700;font-size:15px;color:var(--brand)">--:--</p>
                </div>
            </div>
            <div class="dash-divider" style="margin:0 20px"></div>
            <div style="padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div>
                    <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:#71717a;margin-bottom:4px">Ref ID</p>
                    <div style="display:flex;align-items:center;gap:6px">
                        <span id="refId" class="mono" style="font-weight:600;font-size:11px">${d.reffid}</span>
                        <button onclick="copyText('refId')" style="background:none;border:none;color:#71717a;cursor:pointer;padding:0"><i class="fa-regular fa-copy" style="font-size:11px"></i></button>
                    </div>
                </div>
                <div style="text-align:right">
                    <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:#71717a;margin-bottom:4px">Tanggal</p>
                    <p class="mono" style="font-size:11px;color:#d4d4d8">${fmtDate(d.created_at)}</p>
                </div>
                <div>
                    <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:#71717a;margin-bottom:4px">Customer</p>
                    <p style="font-size:12px;font-weight:500;color:#e4e4e7">@${d.username||'user'}</p>
                </div>
                <div style="text-align:right">
                    <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:#71717a;margin-bottom:4px">Metode</p>
                    <p style="font-size:12px;font-weight:500;color:var(--brand)">QRIS Dinamis</p>
                </div>
            </div>
            <div class="dash-divider" style="margin:0 20px"></div>
            <!-- Detail pesanan -->
            <div style="padding:16px 20px">
                <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:#71717a;margin-bottom:12px">Detail Pesanan</p>
                <div style="display:flex;align-items:center;gap:12px">
                    <div style="width:40px;height:40px;border-radius:8px;background:rgba(243,112,33,0.1);border:1px solid rgba(243,112,33,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#f37021" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                    </div>
                    <p style="font-size:14px;font-weight:600">${d.plan_name}</p>
                </div>
            </div>
            <div class="dash-divider" style="margin:0 20px"></div>
            <div style="padding:16px 20px;display:flex;flex-direction:column;gap:8px">
                <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:#71717a">Subtotal</span><span class="mono" style="color:#e4e4e7">${fmt(d.base_price)}</span></div>
                <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:#71717a">Biaya Layanan QRIS</span><span class="mono" style="color:#e4e4e7">${fmt(d.fee_amount)}</span></div>
                <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:#71717a">Kode Unik</span><span class="mono" style="color:#e4e4e7">${fmt(d.random_amount)}</span></div>
            </div>
            <div class="dash-divider" style="margin:0 20px"></div>
            <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(243,112,33,0.04)">
                <div>
                    <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:#71717a;margin-bottom:2px">Total Pembayaran</p>
                    <p style="font-size:10px;color:#3f3f46">Sudah termasuk biaya layanan</p>
                </div>
                <p class="mono" style="font-weight:900;font-size:22px;color:var(--brand)">${fmt(d.nominal)}</p>
            </div>
        </div>
    </div>

    <!-- QRIS -->
    <div style="display:flex;flex-direction:column;align-items:center;padding:0 24px;padding-top:24px">
        <div style="background:#fff;padding:4px 8px;border-radius:4px;margin-bottom:16px;display:flex;align-items:center;justify-content:center">
            <span style="font-weight:900;font-size:13px;letter-spacing:-0.02em"><span style="color:#ED1C24">QR</span><span style="color:#0067B1">IS</span></span>
        </div>
        <div style="background:#fff;padding:12px;border:2px solid rgba(243,112,33,0.3);border-radius:12px;margin-bottom:12px" class="qr-glow">
            <img src="${d.qris_url}" style="width:208px;height:208px;display:block" alt="QRIS" id="qrisImg">
        </div>
        <div style="text-align:center;margin-bottom:20px">
            <p style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em">${d.merchant_name||'Merchant'}</p>
        </div>

        <!-- Payment methods -->
        <div style="width:100%">
            <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:#71717a;margin-bottom:8px;text-align:center">Didukung Oleh</p>
            <div class="grid-5" style="margin-bottom:8px">
                <div class="pm-chip"><span class="bank-text" style="color:#00AA13">Go<span style="color:#fff">Pay</span></span></div>
                <div class="pm-chip"><span class="bank-text" style="color:#4C2A86">O<span style="color:#FF6B00">V</span>O</span></div>
                <div class="pm-chip"><span class="bank-text" style="color:#118EEA">DANA</span></div>
                <div class="pm-chip"><span class="bank-text" style="color:#EE4D2D">Shopee</span></div>
                <div class="pm-chip"><span class="bank-text" style="color:#E11D2E">Link<span style="color:#fff">Aja</span></span></div>
            </div>
            <div class="grid-5">
                <div class="pm-chip"><span class="bank-text" style="color:#0060AF">BCA</span></div>
                <div class="pm-chip"><span class="bank-text" style="color:#FFC72C">mandiri</span></div>
                <div class="pm-chip"><span class="bank-text" style="color:#F36F21">BNI</span></div>
                <div class="pm-chip"><span class="bank-text" style="color:#00529B">BRI</span></div>
                <div class="pm-chip"><span class="bank-text" style="color:#71717a">+45</span></div>
            </div>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="grid-2" style="padding:0 16px;margin-top:24px">
        <button onclick="downloadQR()" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;background:#0d0c0c;border:1px solid #27272a;color:#fff;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer"><i class="fa-solid fa-download" style="color:var(--brand)"></i> Simpan QR</button>
        <button onclick="copyText('refId')" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;background:#0d0c0c;border:1px solid #27272a;color:#fff;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer"><i class="fa-regular fa-copy" style="color:var(--brand)"></i> Salin Ref ID</button>
    </div>

    <!-- HOW TO PAY -->
    <div id="accBox" style="border-top:1px solid #27272a;margin-top:24px;background:rgba(24,24,27,0.3)">
        <button onclick="this.parentElement.classList.toggle('acc-active')" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:none;border:none;color:#e4e4e7;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit">
            <span style="display:flex;align-items:center;gap:8px"><i class="fa-solid fa-circle-info" style="color:var(--brand);font-size:12px"></i> Cara Pembayaran</span>
            <i class="fa-solid fa-chevron-down rotate" style="font-size:10px;color:#71717a;transition:transform 0.3s"></i>
        </button>
        <div class="acc-content" style="padding:0 20px;font-size:12px;color:#71717a;line-height:1.8">
            <ol style="list-style:decimal inside;display:flex;flex-direction:column;gap:6px;padding-bottom:8px">
                <li>Buka aplikasi e-wallet atau m-banking</li>
                <li>Pilih menu <span style="color:#fff;font-weight:600">Scan QRIS</span> / Bayar</li>
                <li>Arahkan kamera ke QR code di atas</li>
                <li>Pastikan nama merchant: <span style="color:var(--brand);font-weight:700">${d.merchant_name||'Merchant'}</span></li>
                <li>Pastikan nominal: <span class="mono" style="color:var(--brand);font-weight:700">${fmt(d.nominal)}</span></li>
                <li>Konfirmasi & masukkan PIN aplikasi</li>
            </ol>
        </div>
    </div>

    <!-- FOOTER -->
    <div style="padding:20px 16px;display:flex;flex-direction:column;gap:8px;align-items:center;font-size:9px;color:#3f3f46;text-transform:uppercase;letter-spacing:0.15em;background:#121111;margin-top:auto">
        <div style="display:flex;align-items:center;gap:8px">
            <span>Verified By</span>
            <span class="mono" style="padding:2px 6px;border:1px solid #27272a;border-radius:4px;color:#52525b">PCI-DSS</span>
            <span class="mono" style="padding:2px 6px;border:1px solid #27272a;border-radius:4px;color:#52525b">BI</span>
        </div>
    </div>

    <!-- Spacer for sticky CTA -->
    <div style="height:56px"></div>

    <!-- Sticky CTA -->
    <div class="sticky-cta">
        <div style="max-width:420px;margin:0 auto">
            <button onclick="checkStatusManual()" class="cta-btn" style="width:100%;color:#fff;font-weight:900;padding:16px;font-size:13px;text-transform:uppercase;letter-spacing:0.2em;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 -5px 20px rgba(243,112,33,0.25)">
                <i class="fa-solid fa-magnifying-glass-dollar"></i> Cek Status Transaksi
            </button>
        </div>
    </div>`;
}

function showExpired() {
    document.getElementById('loadingState').style.display='none';
    const el = document.getElementById('invoiceContent');
    el.style.display='block';
    const d = orderData;
    el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid #27272a;background:#121111">
        <span style="font-weight:700;color:var(--brand);font-size:15px;text-transform:uppercase">Payment Center</span>
    </div>
    <div class="expired-overlay">
        <div class="expired-icon">
            <i class="fa-solid fa-clock" style="font-size:32px;color:#ef4444"></i>
        </div>
        <h2 style="font-size:22px;font-weight:800;margin-bottom:8px">Pembayaran Expired</h2>
        <p style="font-size:13px;color:#71717a;margin-bottom:24px">Waktu pembayaran telah habis. Silakan buat transaksi baru.</p>
        <div style="background:#0d0c0c;border:1px solid #27272a;border-radius:12px;padding:16px;margin-bottom:24px;text-align:left">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px"><span style="color:#71717a">Ref ID</span><span class="mono" style="font-weight:600">${d.reffid}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px"><span style="color:#71717a">Paket</span><span style="font-weight:600">${d.plan_name}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:#71717a">Nominal</span><span class="mono" style="font-weight:600;color:#ef4444">${fmt(d.nominal)}</span></div>
        </div>
        <a href="/user/dashboard#langganan" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:12px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;text-decoration:none;cursor:pointer">
            <i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard
        </a>
    </div>`;
}

function showPaid() {
    const d = orderData;
    document.getElementById('loadingState').style.display='none';
    document.getElementById('paidAmount').textContent = fmt(d.nominal);
    document.getElementById('paidDetails').innerHTML = `
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:10px"><span style="color:#71717a">Ref ID</span><span class="mono" style="font-weight:600">${d.reffid}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:10px"><span style="color:#71717a">Metode</span><span style="font-weight:600">QRIS</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:10px"><span style="color:#71717a">Waktu Bayar</span><span class="mono" style="font-weight:600">${fmtDate(d.paid_at)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:#71717a">Paket</span><span style="font-weight:600">${d.plan_name}</span></div>`;
    document.getElementById('paymentReceived').classList.add('show');
}

function showError(msg) {
    document.getElementById('loadingState').style.display='none';
    const el = document.getElementById('errorState');
    el.style.display='block';
    el.innerHTML = `
    <div style="text-align:center;padding:80px 24px">
        <div style="width:64px;height:64px;border-radius:50%;background:rgba(239,68,68,0.1);border:2px solid rgba(239,68,68,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
            <i class="fa-solid fa-triangle-exclamation" style="font-size:24px;color:#ef4444"></i>
        </div>
        <h2 style="font-size:18px;font-weight:700;margin-bottom:8px">Transaksi Tidak Ditemukan</h2>
        <p style="font-size:13px;color:#71717a;margin-bottom:24px">${msg}</p>
        <a href="/user/dashboard#langganan" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:12px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;text-decoration:none">
            <i class="fa-solid fa-arrow-left"></i> Kembali
        </a>
    </div>`;
}

// Countdown
function startCountdown() {
    const expiresAt = new Date(orderData.expires_at).getTime();
    const el = document.getElementById('timer');
    const tick = () => {
        const diff = Math.max(0, Math.floor((expiresAt - Date.now()) / 1000));
        if (diff <= 0) { el.textContent = '00:00'; clearInterval(timerInterval); showExpired(); return; }
        el.textContent = String(Math.floor(diff/60)).padStart(2,'0') + ':' + String(diff%60).padStart(2,'0');
    };
    tick();
    timerInterval = setInterval(tick, 1000);
}

// Poll status
function startStatusPoll() {
    pollInterval = setInterval(async () => {
        try {
            const res = await fetch(`/api/checkout/status/${REFFID}`);
            const json = await res.json();
            if (!json.success) return;
            if (json.data.status === 'PAID') {
                clearInterval(pollInterval); clearInterval(timerInterval);
                orderData = json.data;
                showPaid();
            } else if (json.data.status === 'EXPIRED') {
                clearInterval(pollInterval); clearInterval(timerInterval);
                orderData = json.data;
                showExpired();
            }
        } catch(_) {}
    }, 5000);
}

async function checkStatusManual() {
    try {
        const res = await fetch(`/api/checkout/status/${REFFID}`);
        const json = await res.json();
        if (json.data?.status === 'PAID') {
            clearInterval(pollInterval); clearInterval(timerInterval);
            orderData = json.data; showPaid();
        } else if (json.data?.status === 'EXPIRED') {
            clearInterval(pollInterval); clearInterval(timerInterval);
            orderData = json.data; showExpired();
        } else {
            showToast('Pembayaran belum diterima...');
        }
    } catch(_) { showToast('Gagal cek status'); }
}

function copyText(id) {
    const el = document.getElementById(id);
    const text = el.innerText || el.textContent;
    navigator.clipboard.writeText(text).then(() => {
        showToast('Ref ID tersalin!');
        el.classList.add('copy-flash');
        setTimeout(() => el.classList.remove('copy-flash'), 600);
    });
}

function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastText').textContent = msg;
    t.style.opacity = '1'; t.style.transform = 'translate(-50%, 8px)';
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 0)'; }, 1600);
}

function downloadQR() {
    if (!orderData?.qris_url) return;
    const a = document.createElement('a');
    a.href = orderData.qris_url; a.download = `QRIS-${REFFID}.png`; a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    showToast('Mengunduh QR...');
}

function closeReceived() { document.getElementById('paymentReceived').classList.remove('show'); }

init();
</script>
</body>
</html>
